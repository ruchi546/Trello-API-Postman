name: Automated API tests using Postman CLI

on: push

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Run API tests
        run: |
          postman collection run "53749011-af41bec6-9299-441c-bf86-b4f638a04b82" \
            -e "53749011-b35ebf13-d46d-4a59-aa7d-81298ee3e793" \
            --env-var "key=${{ secrets.TRELLO_KEY }}" \
            --env-var "token=${{ secrets.TRELLO_TOKEN }}" \
            --env-var "base_url=https://trello.com"
